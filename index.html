<!DOCTYPE HTML>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Professional Portfolio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
    }
    .left-half {
      width: 50%;
      background: url('Anwaya.jpg') no-repeat center center;
      background-size: cover;
    }
    .right-half {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fef6eb;
      color: #3d2c1e;
      text-align: center;
    }
    .content {
      padding: 20px;
      border-radius: 10px;
    }
    .title {
      font-size: 4em;
      font-weight: bold;
      font-family: 'Georgia', serif;
    }
    .subtitle {
      font-size: 1.5em; font-family: 'Poppins', sans-serif;
    }
    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="left-half"></div>
  <div class="right-half">
    <div class="content">
      <div class="title">Anwaya Wadnerkar</div>
      <div class="subtitle">Crafting impactful stories through tech and art</div>
