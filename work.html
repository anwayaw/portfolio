<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Studies</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .navbar {
            display: flex;
            justify-content: center;
            background: #000;
            padding: 10px;
        }
        .navbar a {
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .hero {
            background: #001F5B;
            color: white;
            padding: 100px 20px;
            font-size: 24px;
        }
        .hero p {
            font-size: 18px;
        }
        .scroll-down {
            cursor: pointer;
            display: block;
            margin: 20px auto;
            font-size: 24px;
            color: white;
            background: none;
            border: none;
        }
        .container {
            padding: 50px 20px;
        }
        .dropdown {
            margin-bottom: 20px;
            text-align: left;
        }
        .dropdown button {
            background: #007BFF;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }
        .dropdown-content {
            display: none;
            background: #f9f9f9;
            padding: 10px;
            border: 1px solid #ddd;
            margin-top: 5px;
        }
        .dropdown.active .dropdown-content {
            display: block;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#about">About</a>
        <a href="#my-story">My Story</a>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
    </div>
    
    <div class="hero">
        <h1>Hi, I'm Anwaya a Product & Strategy Enthusiast</h1>
        <p>Explore my work below</p>
        <button class="scroll-down" onclick="scrollToSection()">&#x2193;</button>
    </div>
    
    <div class="container" id="case-studies">
        <div class="dropdown">
            <button onclick="toggleDropdown(this)">Case Studies</button>
            <div class="dropdown-content">
                <div class="dropdown">
                    <button onclick="toggleDropdown(this)">Case Study 1</button>
                    <div class="dropdown-content">
                        <p>This case study explores the market analysis for sports medicine at Medbridge</p>
                        <a href="Market Analysis_ Sports Medicine_MedBridge Project.pdf" target="_blank">View PDF</a>
                    </div>
                </div>
                
                <div class="dropdown">
                    <button onclick="toggleDropdown(this)">Case Study 2</button>
                    <div class="dropdown-content">
                        <p>An in-depth analysis of security improvements in identity access management.</p>
                        <a href="pdfs/case_study_2.pdf" target="_blank">View PDF</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function toggleDropdown(button) {
            let parent = button.parentElement;
            parent.classList.toggle("active");
        }
        function scrollToSection() {
            document.getElementById("case-studies").scrollIntoView({ behavior: "smooth" });
        }
    </script>
</body>
</html>
